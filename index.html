<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Smart Task Manager</h1>
    <p>Task-2 | HTML, CSS & JavaScript</p>
</header>

<div class="container">

    <!-- Contact Form -->
    <section class="contact">

        <h2>Contact Form</h2>

        <form id="contactForm">

            <input
            type="text"
            id="name"
            placeholder="Enter your Name">

            <input
            type="email"
            id="email"
            placeholder="Enter your Email">

            <textarea
            id="message"
            rows="5"
            placeholder="Enter your Message"></textarea>

            <button type="submit">
                Submit
            </button>

        </form>

    </section>

    <!-- To Do List -->

    <section class="todo">

        <h2>My Tasks</h2>

        <div class="task-box">

            <input
            type="text"
            id="taskInput"
            placeholder="Enter New Task">

            <button onclick="addTask()">
                Add Task
            </button>

        </div>

        <ul id="taskList">

        </ul>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
